name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APPROVER_EMAILS: ${{ secrets.VITE_APPROVER_EMAILS }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "Missing GitHub Actions secret: VITE_SUPABASE_URL"
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing GitHub Actions secret: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          if [ -z "$VITE_APPROVER_EMAILS" ]; then
            echo "Warning: GitHub Actions secret VITE_APPROVER_EMAILS is empty. Delete-all will stay restricted for everyone."
          fi
          echo "Supabase secrets are configured."

      - name: Build
        env:
          VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
          VITE_TENANT_ID: ${{ secrets.VITE_TENANT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_SHAREPOINT_SITE_ID: ${{ secrets.VITE_SHAREPOINT_SITE_ID }}
          VITE_EXCEL_FILE_ID: ${{ secrets.VITE_EXCEL_FILE_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APPROVER_EMAILS: ${{ secrets.VITE_APPROVER_EMAILS }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
